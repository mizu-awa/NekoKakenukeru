<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump Timeline - ステージ難易度可視化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 4px;
      color: #f1c40f;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .stage-section {
      margin-bottom: 32px;
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
    }
    .stage-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .stage-header h2 {
      font-size: 16px;
      color: #38bdf8;
    }
    .stage-meta {
      font-size: 12px;
      color: #64748b;
    }
    .stage-meta span { margin-right: 12px; }
    canvas {
      display: block;
      border-radius: 4px;
    }
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #94a3b8;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 16px;
      height: 12px;
      border-radius: 2px;
      display: inline-block;
    }
    .difficulty-summary {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 12px;
    }
    .diff-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Jump Timeline</h1>
  <div class="subtitle">各ステージのジャンプタイミングと難易度を可視化</div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:#7f1d1d;border:1px solid #ef4444"></span> 障害物</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#22c55e"></span> 余裕あり (猶予 &gt;30f)</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#eab308"></span> 要注意 (猶予 15-30f)</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#ef4444"></span> 危険 (猶予 &lt;15f)</div>
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(239,68,68,0.15)"></span> 同時操作区間</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#38bdf8"></span> ジャンプ滞空</div>
  </div>

  <div id="container"></div>

  <script>
// ============================================================
// Load config and run simulation
// ============================================================
async function main() {
  const cfg = await fetch('./config.json').then(r => r.json());

  const { GRAVITY, JUMP_V, PART_W, PART_H, PART_GAP, GROUND_Y,
          PART_LABELS, PART_COLORS, STAGES } = cfg;

  // --- Physics helpers (mirrored from game.js) ---

  function calcJumpDeadline(partWorldX, obs, speed) {
    if (GROUND_Y <= obs.y || (GROUND_Y - PART_H) >= obs.y + obs.h) return null;
    const distToEntry = obs.x - (partWorldX + PART_W / 2);
    const distToExit  = (obs.x + obs.w) - (partWorldX - PART_W / 2);
    if (distToExit <= 0) return null;
    if (distToEntry <= 0) return { dMax: -1 };
    const framesToEntry = distToEntry / speed;
    const framesToExit  = distToExit / speed;
    const MARGIN = 1;
    const a    = 0.5 * GRAVITY;
    const b    = JUMP_V;
    const c    = GROUND_Y - (obs.y - MARGIN);
    const disc = b * b - 4 * a * c;
    if (disc < 0) return { impossible: true, dMax: -Infinity };
    const sq = Math.sqrt(disc);
    const u1 = (-b - sq) / (2 * a);
    const u2 = (-b + sq) / (2 * a);
    const dMax = framesToEntry - u1;
    const dMin = framesToExit  - u2;
    if (dMax < dMin) return { impossible: true, dMax: -Infinity };
    return { dMax, dMin, u1, u2 };
  }

  function simulateJump(partWorldX, obstacles, speed) {
    let y  = GROUND_Y - PART_H;
    let vy = JUMP_V;
    for (let t = 1; t <= 200; t++) {
      const wx = partWorldX + speed * t;
      vy += GRAVITY;
      y  += vy;
      if (y >= GROUND_Y - PART_H) return { safe: true, landFrame: t };
      const left = wx - PART_W / 2, right = wx + PART_W / 2;
      const top = y, bottom = y + PART_H;
      for (const obs of obstacles) {
        if (right > obs.x && left < obs.x + obs.w &&
            bottom > obs.y && top < obs.y + obs.h) {
          return { safe: false, collideFrame: t, obs };
        }
      }
    }
    return { safe: true, landFrame: 200 };
  }

  // --- Simulate a stage and collect jump events ---

  function simulateStage(stageIdx) {
    const def = STAGES[stageIdx];
    const { speed, length: stageLen, numParts } = def;
    const obstacles = def.obstacles.map(o => ({ ...o }));

    // Create parts
    const parts = [];
    for (let i = 0; i < numParts; i++) {
      parts.push({
        index: i,
        worldX: 220 - (numParts - 1 - i) * PART_GAP,
        y: GROUND_Y - PART_H,
        vy: 0,
        onGround: true,
      });
    }

    const maxFrames = Math.ceil(stageLen / speed) + 500;
    const jumpEvents = []; // { partIndex, jumpFrame, jumpWorldX, landFrame, urgency, obsX }
    let distance = 0;

    for (let frame = 0; frame < maxFrames; frame++) {
      // Auto-play decision
      for (const part of parts) {
        if (!part.onGround) continue;

        let urgentDeadline = Infinity;
        let targetObs = null;
        for (const obs of obstacles) {
          const r = calcJumpDeadline(part.worldX, obs, speed);
          if (!r) continue;
          if (r.dMax < urgentDeadline) {
            urgentDeadline = r.dMax;
            targetObs = obs;
          }
        }
        if (urgentDeadline > 5) continue;

        const sim = simulateJump(part.worldX, obstacles, speed);
        let doJump = false;
        if (sim.safe && urgentDeadline <= 2) doJump = true;
        if (urgentDeadline <= 0) doJump = true;

        if (doJump) {
          part.vy = JUMP_V;
          part.onGround = false;
          jumpEvents.push({
            partIndex: part.index,
            jumpFrame: frame,
            jumpWorldX: part.worldX,
            landFrame: null,
            urgency: urgentDeadline,
            obsX: targetObs ? targetObs.x : 0,
          });
        }
      }

      // Physics update
      for (const part of parts) {
        part.worldX += speed;
        part.vy += GRAVITY;
        part.y += part.vy;
        if (part.y >= GROUND_Y - PART_H) {
          part.y = GROUND_Y - PART_H;
          if (!part.onGround) {
            // Record landing
            for (let j = jumpEvents.length - 1; j >= 0; j--) {
              if (jumpEvents[j].partIndex === part.index && jumpEvents[j].landFrame === null) {
                jumpEvents[j].landFrame = frame;
                break;
              }
            }
          }
          part.vy = 0;
          part.onGround = true;
        }
      }

      distance += speed;
      if (distance >= stageLen) break;
    }

    return { jumpEvents, totalFrames: Math.ceil(stageLen / speed), obstacles, stageLen, speed, numParts };
  }

  // --- Render timeline for one stage ---

  function renderTimeline(container, stageIdx) {
    const section = document.createElement('div');
    section.className = 'stage-section';

    const sim = simulateStage(stageIdx);
    const def = STAGES[stageIdx];

    // Header
    const header = document.createElement('div');
    header.className = 'stage-header';
    header.innerHTML = `
      <h2>Stage ${stageIdx + 1}</h2>
      <div class="stage-meta">
        <span>Speed: ${def.speed}</span>
        <span>Parts: ${def.numParts}</span>
        <span>Distance: ${def.length}px</span>
        <span>Obstacles: ${def.obstacles.length}</span>
        <span>Jumps: ${sim.jumpEvents.length}</span>
      </div>
    `;
    section.appendChild(header);

    // Canvas
    const ROW_H = 32;
    const LABEL_W = 36;
    const PAD_TOP = 24;
    const PAD_BOTTOM = 28;
    const canvasW = Math.min(window.innerWidth - 80, 1200);
    const canvasH = PAD_TOP + sim.numParts * ROW_H + PAD_BOTTOM;
    const timelineW = canvasW - LABEL_W - 10;

    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    section.appendChild(canvas);

    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Helper: world X -> canvas X
    const xScale = timelineW / sim.stageLen;
    const toCanvasX = (wx) => LABEL_W + wx * xScale;

    // Draw distance markers
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#475569';
    const markerStep = sim.stageLen <= 4000 ? 500 : 1000;
    for (let d = 0; d <= sim.stageLen; d += markerStep) {
      const cx = toCanvasX(d);
      ctx.beginPath();
      ctx.moveTo(cx, PAD_TOP);
      ctx.lineTo(cx, PAD_TOP + sim.numParts * ROW_H);
      ctx.strokeStyle = 'rgba(71,85,105,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#475569';
      ctx.fillText(d + 'px', cx, PAD_TOP + sim.numParts * ROW_H + 4);
    }

    // Draw row backgrounds & labels
    for (let i = 0; i < sim.numParts; i++) {
      const rowY = PAD_TOP + i * ROW_H;
      if (i % 2 === 0) {
        ctx.fillStyle = 'rgba(30,41,59,0.5)';
        ctx.fillRect(LABEL_W, rowY, timelineW, ROW_H);
      }

      // Part label
      ctx.fillStyle = PART_COLORS[i];
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(PART_LABELS[i], LABEL_W / 2, rowY + ROW_H / 2);
    }

    // Detect simultaneous jump zones (multiple parts in air at same time)
    // Build a frame-based overlap map
    const frameInAir = new Uint8Array(sim.totalFrames + 1);
    for (const ev of sim.jumpEvents) {
      const land = ev.landFrame ?? ev.jumpFrame + 100;
      for (let f = ev.jumpFrame; f <= Math.min(land, sim.totalFrames); f++) {
        frameInAir[f]++;
      }
    }

    // Highlight simultaneous zones (2+ parts in air)
    ctx.fillStyle = 'rgba(239,68,68,0.10)';
    let inZone = false;
    let zoneStart = 0;
    for (let f = 0; f <= sim.totalFrames; f++) {
      if (frameInAir[f] >= 2 && !inZone) {
        inZone = true;
        zoneStart = f;
      } else if (frameInAir[f] < 2 && inZone) {
        inZone = false;
        const x1 = toCanvasX(zoneStart * sim.speed);
        const x2 = toCanvasX(f * sim.speed);
        ctx.fillRect(x1, PAD_TOP, x2 - x1, sim.numParts * ROW_H);
      }
    }
    if (inZone) {
      const x1 = toCanvasX(zoneStart * sim.speed);
      const x2 = toCanvasX(sim.totalFrames * sim.speed);
      ctx.fillRect(x1, PAD_TOP, x2 - x1, sim.numParts * ROW_H);
    }

    // Draw obstacles (full-height markers)
    for (const obs of sim.obstacles) {
      const cx = toCanvasX(obs.x);
      const w = Math.max(obs.w * xScale, 2);
      ctx.fillStyle = 'rgba(127,29,29,0.6)';
      ctx.fillRect(cx, PAD_TOP, w, sim.numParts * ROW_H);
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, PAD_TOP);
      ctx.lineTo(cx, PAD_TOP + sim.numParts * ROW_H);
      ctx.stroke();
    }

    // Draw jump events
    for (const ev of sim.jumpEvents) {
      const rowY = PAD_TOP + ev.partIndex * ROW_H;
      const startX = toCanvasX(ev.jumpWorldX);
      const landWorldX = ev.jumpWorldX + (ev.landFrame - ev.jumpFrame) * sim.speed;
      const endX = toCanvasX(landWorldX);

      // Airborne bar
      const barH = 8;
      const barY = rowY + (ROW_H - barH) / 2;

      ctx.fillStyle = 'rgba(56,189,248,0.4)';
      ctx.fillRect(startX, barY, endX - startX, barH);

      // Urgency dot at jump point
      let dotColor;
      if (ev.urgency > 30) dotColor = '#22c55e';
      else if (ev.urgency > 15) dotColor = '#eab308';
      else dotColor = '#ef4444';

      ctx.beginPath();
      ctx.arc(startX, rowY + ROW_H / 2, 5, 0, Math.PI * 2);
      ctx.fillStyle = dotColor;
      ctx.fill();
    }

    // Difficulty summary
    const diffDiv = document.createElement('div');
    diffDiv.className = 'difficulty-summary';

    // Calculate metrics
    const avgUrgency = sim.jumpEvents.length > 0
      ? sim.jumpEvents.reduce((s, e) => s + e.urgency, 0) / sim.jumpEvents.length
      : Infinity;
    const minUrgency = sim.jumpEvents.length > 0
      ? Math.min(...sim.jumpEvents.map(e => e.urgency))
      : Infinity;
    const dangerCount = sim.jumpEvents.filter(e => e.urgency < 15).length;

    // Count simultaneous jump frames
    let simultaneousFrames = 0;
    for (let f = 0; f <= sim.totalFrames; f++) {
      if (frameInAir[f] >= 2) simultaneousFrames++;
    }
    const simultaneousPct = ((simultaneousFrames / sim.totalFrames) * 100).toFixed(1);

    // Overall difficulty score (0-100)
    const densityScore = Math.min(def.obstacles.length / def.length * 1000, 1) * 25;
    const speedScore = ((def.speed - 1.4) / 0.5) * 25;
    const partsScore = ((def.numParts - 3) / 2) * 25;
    const urgencyScore = Math.max(0, 1 - avgUrgency / 60) * 25;
    const totalScore = Math.round(densityScore + speedScore + partsScore + urgencyScore);

    let diffLabel, diffColor;
    if (totalScore < 25) { diffLabel = 'Easy'; diffColor = '#22c55e'; }
    else if (totalScore < 45) { diffLabel = 'Normal'; diffColor = '#38bdf8'; }
    else if (totalScore < 65) { diffLabel = 'Hard'; diffColor = '#eab308'; }
    else { diffLabel = 'Very Hard'; diffColor = '#ef4444'; }

    diffDiv.innerHTML = `
      <span class="diff-badge" style="background:${diffColor}22;color:${diffColor};border:1px solid ${diffColor}">
        ${diffLabel} (${totalScore}/100)
      </span>
      <span style="color:#94a3b8">
        平均猶予: ${avgUrgency.toFixed(1)}f
        | 最小猶予: ${minUrgency.toFixed(1)}f
        | 危険ジャンプ: ${dangerCount}/${sim.jumpEvents.length}
        | 同時操作: ${simultaneousPct}%
      </span>
    `;
    section.appendChild(diffDiv);

    container.appendChild(section);
  }

  // Render all stages
  const container = document.getElementById('container');
  for (let i = 0; i < STAGES.length; i++) {
    renderTimeline(container, i);
  }
}

main();
  </script>
</body>
</html>
